<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bike Neon</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bike Neon">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DS-Digital"', 'sans-serif'] },
                    colors: {
                        neon: {
                            main: 'var(--neon-main)',
                            bg: 'var(--neon-bg)',
                            dark: 'var(--neon-dark)',
                            dim: 'var(--neon-dim)',
                            gauge: 'var(--neon-gauge)',
                        }
                    },
                    boxShadow: {
                        'neon-sm': '0 0 var(--box-glow-sm) var(--neon-main)',
                        'neon-md': '0 0 var(--box-glow-md) var(--neon-main)',
                        'neon-lg': '0 0 30px var(--neon-main)',
                        'neon-glow': '0 0 var(--glow-spread-1) var(--neon-main)',
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    
    <style>
        @import url('https://fonts.cdnfonts.com/css/ds-digital');

        :root {
            --neon-main: #ffff00;
            --neon-bg: #eab308;
            --neon-dark: #ca8a04;
            --neon-dim: #854d0e;
            --neon-gauge: #0088ff; 
            
            --glow-spread-1: 2px;
            --glow-spread-2: 5px;
            --box-glow-sm: 4px;
            --box-glow-md: 8px;
            --dimmer-opacity: 0; 
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: #000;
            color: var(--neon-main);
            font-family: 'DS-Digital', sans-serif;
            overflow: hidden;
            letter-spacing: 0.05em; 
        }

        .no-select { user-select: none; -webkit-user-select: none; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .leaflet-layer { filter: invert(100%) grayscale(100%) contrast(120%) brightness(80%); transition: filter 0.3s ease; }

        #dimmerOverlay {
            position: fixed; inset: 0; background: black;
            opacity: var(--dimmer-opacity); pointer-events: none;
            z-index: 5000; transition: opacity 0.3s ease;
        }

        .font-digital { font-family: 'DS-Digital', sans-serif; }
        .neon-glow { text-shadow: 0 0 var(--glow-spread-1) var(--neon-main), 0 0 var(--glow-spread-2) var(--neon-dark); transition: text-shadow 0.3s ease; }
        .neon-gauge-glow { text-shadow: 0 0 var(--glow-spread-1) var(--neon-gauge), 0 0 var(--glow-spread-2) var(--neon-gauge); transition: text-shadow 0.3s ease; }

        #dashboardContainer { transition: all 0.3s ease; }
        .dash-expanded { height: 68dvh !important; }
        .dash-full { height: 100dvh !important; border-radius: 0 !important; }

        @keyframes pulse-nearby {
            0% { box-shadow: 0 0 8px var(--neon-gauge); border-color: var(--neon-gauge); }
            50% { box-shadow: 0 0 25px var(--neon-gauge); border-color: #fff; }
            100% { box-shadow: 0 0 8px var(--neon-gauge); border-color: var(--neon-gauge); }
        }
        .nearby-pulse { animation: pulse-nearby 1.5s infinite ease-in-out; color: #fff !important; }

        body.br-bright { --dimmer-opacity: 0.25; --glow-spread-1: 3px; --glow-spread-2: 6px; }
        body.br-max { --dimmer-opacity: 0; --glow-spread-1: 4px; --glow-spread-2: 8px; }

        #dashboardContainer.carousel-mode {
            background-color: #0a0a0a; border: 1px solid #27272a;
            border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        
        #dashboardContainer.map-view-active {
            background-color: transparent !important; border-color: transparent !important; box-shadow: none !important;
        }

        #dashboardContainer.grid-mode {
            background: transparent !important; border-color: transparent !important;
            display: grid; grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr); gap: 0.75rem;
            padding-top: 0.5rem; height: 100% !important;
        }
        
        #dashboardContainer.grid-mode > .dash-view {
            position: relative !important; opacity: 1 !important; pointer-events: auto !important;
            background: #0a0a0a; border: 1px solid #27272a; border-radius: 1.25rem;
            display: flex; align-items: center; justify-content: center;
        }

        #dashboardContainer.grid-mode #speedGaugeContainer { width: 140px; height: 140px; }
        #dashboardContainer.grid-mode #speed { font-size: 4rem !important; }
        #dashboardContainer.grid-mode #speedExtra, #dashboardContainer.grid-mode #view-goal, #dashboardContainer.grid-mode #view-map { display: none !important; }
        #dashboardContainer.grid-mode #view-cadence { display: flex !important; opacity: 1 !important; z-index: 10 !important;}
    </style>
</head>
<body class="flex flex-col h-full w-full no-select relative">

    <div id="dimmerOverlay"></div>
    <div id="map"></div>

    <div class="absolute top-6 left-4 z-[1010] pointer-events-auto flex flex-col space-y-3 items-start">
        <button id="themeBtn" class="px-3 py-2 rounded-lg bg-black border border-neon-main shadow-neon-sm flex items-center justify-center text-neon-main transition-all active:scale-95">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>

        <button id="brightnessBtn" class="px-3 py-2 rounded-lg bg-black border border-neon-main shadow-neon-sm flex items-center justify-center text-neon-main transition-all active:scale-95">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>

        <button id="reloadBtn" class="px-3 py-2 rounded-lg bg-black border border-neon-main shadow-neon-sm flex items-center justify-center text-neon-main transition-all active:scale-95">
            <svg class="w-4 h-4 text-white opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
        <button id="settingsBtn" class="px-3 py-2 rounded-lg bg-black border border-neon-main shadow-neon-sm flex items-center justify-center text-neon-main transition-all active:scale-95 mt-1">
            <svg class="w-4 h-4 text-white opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
    </div>

    <div class="absolute top-6 w-full px-4 z-[1010] flex justify-center pointer-events-none">
        <div id="statusIndicator" class="inline-flex items-center justify-center px-5 py-1.5 rounded-full bg-black border border-neon-main text-neon-main pointer-events-auto shadow-neon-sm">
            <span id="statusDot" class="w-2 h-2 rounded-full bg-neon-main mr-3 animate-pulse"></span>
            <span id="statusText" class="font-digital text-sm uppercase tracking-widest mt-0.5 text-white opacity-90">Ready to ride</span>
        </div>
    </div>

    <div class="absolute top-6 right-4 z-[1010] pointer-events-none flex flex-col items-end space-y-2">
        <div class="px-4 py-2 rounded-lg bg-black border border-neon-gauge shadow-[0_0_var(--box-glow-md)_var(--neon-gauge)] transition-all">
            <span id="liveTimerText" class="font-digital text-neon-gauge text-3xl neon-gauge-glow tracking-widest tabular-nums">00:00</span>
        </div>
        <button id="autoPauseToggle" class="pointer-events-auto px-3 py-1.5 rounded bg-black border border-green-500 text-green-500 font-digital text-[0.7rem] uppercase tracking-widest transition-all shadow-[0_0_8px_rgba(34,197,94,0.3)]">Auto Pause: ON</button>
        <div id="upcomingHillIndicator" class="hidden px-3 py-1 rounded-lg bg-black border border-zinc-800 transition-all duration-300">
            <span id="upcomingHillText" class="font-bold text-xs font-digital tracking-widest text-white opacity-90"></span>
        </div>
    </div>

    <div id="bottomDashboard" class="absolute bottom-0 w-full dash-expanded bg-black border-t border-zinc-900 rounded-t-[2.5rem] p-4 sm:p-6 z-[1000] flex flex-col shadow-2xl transition-all duration-500">
        <div class="flex justify-center items-center mb-5 w-full max-w-sm mx-auto px-2 relative">
            <div id="indicators" class="flex space-x-2.5">
                <div class="view-dot w-2 h-2 rounded-full bg-neon-main shadow-neon-sm transition-colors"></div>
                <div class="view-dot w-2 h-2 rounded-full bg-zinc-800 transition-colors"></div>
                <div class="view-dot w-2 h-2 rounded-full bg-zinc-800 transition-colors"></div>
                <div class="view-dot w-2 h-2 rounded-full bg-zinc-800 transition-colors"></div>
                <div class="view-dot w-2 h-2 rounded-full bg-zinc-800 transition-colors"></div>
                <div class="view-dot w-2 h-2 rounded-full bg-zinc-800 transition-colors"></div>
            </div>
            <button id="toggleBtn" class="absolute right-0 text-zinc-500 hover:text-white transition-colors">
                <svg id="toggleIcon" class="w-6 h-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>

        <div id="dashboardContainer" class="carousel-mode relative flex-1 max-w-sm mx-auto mb-4 w-full shadow-lg">
            <button id="navLeft" class="absolute left-3 top-1/2 -translate-y-1/2 p-2 z-20 text-zinc-500 hover:text-white active:text-white transition-colors"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg></button>
            <button id="navRight" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 z-20 text-zinc-500 hover:text-white active:text-white transition-colors"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></button>

            <div id="view-speed" class="dash-view absolute inset-0 flex flex-col items-center justify-center space-y-4 py-2 opacity-100 z-10 transition-opacity">
                <div id="speedGaugeContainer" class="relative w-44 h-44 sm:w-48 sm:h-48 flex flex-col items-center justify-center bg-black rounded-full border-[4px] border-zinc-900 shadow-[0_0_20px_rgba(0,0,0,0.8)_inset] transition-all duration-300">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
                        <defs><mask id="gaugeMask"><circle cx="50" cy="50" r="38" fill="none" stroke="white" stroke-width="14" stroke-dasharray="4 2" pathLength="100" /></mask></defs>
                        <circle cx="50" cy="50" r="38" fill="none" stroke="#18181b" stroke-width="14" mask="url(#gaugeMask)" stroke-dasharray="75 100" pathLength="100" transform="rotate(135 50 50)" />
                        <circle id="speedGauge" cx="50" cy="50" r="38" fill="none" stroke="var(--neon-main)" stroke-width="14" mask="url(#gaugeMask)" stroke-dasharray="75 100" stroke-dashoffset="75" pathLength="100" transform="rotate(135 50 50)" class="transition-all duration-300" style="filter: drop-shadow(0 0 4px var(--neon-main));" />
                    </svg>
                    <div class="absolute flex flex-col items-center justify-center mt-2">
                        <div id="speed" class="text-[5rem] sm:text-[6rem] font-digital neon-glow leading-none text-neon-main">00</div>
                        <div class="text-[0.65rem] font-digital uppercase tracking-widest text-white opacity-80 mt-1">MPH</div>
                    </div>
                </div>
                <div id="speedExtra" class="grid grid-cols-3 gap-2 w-full px-4 pb-2">
                    <div class="text-center"><div id="avgSpeed" class="text-2xl sm:text-3xl font-digital neon-glow text-neon-main">0.0</div><small class="text-white opacity-80 font-digital uppercase tracking-widest text-[0.55rem]">AVG SPD</small></div>
                    <div class="text-center"><div id="flatTopSpeed" class="text-2xl sm:text-3xl font-digital neon-glow text-neon-main">0.0</div><small class="text-white opacity-80 font-digital uppercase tracking-widest text-[0.55rem]">FLAT MAX</small></div>
                    <div class="text-center"><div id="topSpeed" class="text-2xl sm:text-3xl font-digital neon-glow text-neon-main">0.0</div><small class="text-white opacity-80 font-digital uppercase tracking-widest text-[0.55rem]">ABS MAX</small></div>
                </div>
            </div>

            <div id="view-distance" class="dash-view absolute inset-0 flex flex-col items-center justify-center opacity-0 z-0 transition-opacity">
                <div id="odoScale" class="flex flex-col items-center">
                    <div class="text-[0.6rem] text-white opacity-80 font-digital uppercase tracking-widest mb-6">Total Distance</div>
                    <div class="text-6xl font-digital bg-black p-4 rounded-xl border border-zinc-900 flex space-x-1 tabular-nums shadow-inner">
                        <div id="odo1" class="hidden">0</div><div id="odo2" class="hidden">0</div><div id="odo3">0</div><div class="text-white">.</div><div id="odo4" class="text-neon-gauge">0</div><div id="odo5" class="text-neon-gauge">0</div>
                    </div>
                    <div class="text-lg font-digital uppercase tracking-widest mt-6 text-white opacity-80">Miles</div>
                </div>
            </div>

            <div id="view-compass" class="dash-view absolute inset-0 flex flex-col items-center justify-center opacity-0 z-0 transition-opacity">
                <div id="compassScale" class="flex flex-col items-center">
                    <div id="headingDir" class="text-5xl font-digital neon-glow mb-6 text-neon-main">--</div>
                    <div class="relative w-40 h-40 bg-black rounded-full border-4 border-zinc-900 flex items-center justify-center shadow-2xl">
                        <div id="compassRose" class="w-full h-full absolute flex items-center justify-center transition-transform duration-500">
                            <span class="absolute top-2 text-white opacity-90 font-digital tracking-widest text-lg">N</span>
                            <div class="w-1 h-20 bg-neon-gauge rounded-full shadow-[0_0_10px_var(--neon-gauge)]"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-goal" class="dash-view absolute inset-0 flex flex-col items-center justify-center opacity-0 z-0 transition-opacity p-6">
                <div class="flex space-x-2 bg-black p-2 rounded-xl mb-4 w-full max-w-[250px] border border-zinc-900 shadow-inner">
                    <button id="btnGoalDistance" class="flex-1 py-2 text-sm font-digital tracking-widest rounded-lg bg-white text-black uppercase">Miles</button>
                    <button id="btnGoalTime" class="flex-1 py-2 text-sm font-digital tracking-widest rounded-lg text-white opacity-60 hover:opacity-100 uppercase transition-opacity">Minutes</button>
                </div>
                <div class="bg-black p-3 rounded-2xl border border-zinc-800 w-full max-w-[250px] flex items-center justify-center mb-6 shadow-inner">
                    <input type="number" id="goalInput" class="w-24 bg-transparent text-neon-main text-center font-digital text-5xl outline-none neon-glow" placeholder="0.0">
                    <span id="goalUnitLabel" class="text-white opacity-80 font-digital text-lg uppercase pr-2 tracking-widest">Mi</span>
                </div>
            </div>

            <div id="view-cadence" class="dash-view absolute inset-0 flex flex-col items-center justify-center opacity-0 z-0 transition-opacity">
                <div class="flex flex-col items-center">
                    <div class="text-[0.6rem] text-white opacity-80 font-digital uppercase tracking-widest mb-4">Est. Pedal Cadence</div>
                    <div id="cadenceVal" class="text-[7rem] font-digital neon-glow mb-2 text-neon-main leading-none">00</div>
                    <div class="text-lg font-digital uppercase tracking-widest text-white opacity-80">RPM</div>
                </div>
            </div>
            
            <div id="view-map" class="dash-view absolute inset-0 opacity-0 z-0 pointer-events-none"></div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4 w-full max-w-sm mx-auto shrink-0">
            <button id="mainActionBtn" class="w-full bg-[#2ecc71] text-black font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_15px_rgba(46,204,113,0.4)] border border-[#2ecc71]">Start Ride</button>
            <button id="saveRouteBtn" disabled class="w-full bg-[#1a1a1a] text-zinc-600 font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform border border-zinc-800">Stop / Save</button>
            <button id="openRoutesBtn" class="w-full bg-black border border-white text-white font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase shadow-[0_0_5px_rgba(255,255,255,0.3)] active:scale-95 transition-all">Routes</button>
            <button id="liveSummaryBtn" class="w-full bg-black border border-white text-white font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_5px_rgba(255,255,255,0.3)]">Totals</button>
        </div>
    </div>

    <div id="alertModal" class="hidden absolute inset-0 bg-black/90 z-[3000] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#0a0a0a] border border-zinc-700 shadow-[0_0_10px_rgba(255,255,255,0.1)] p-8 rounded-2xl max-w-xs text-center font-digital"><p id="alertText" class="text-white font-bold mb-8 tracking-widest text-lg"></p><button id="closeAlertBtn" class="w-full py-3 bg-white text-black font-bold tracking-widest uppercase rounded-lg shadow-[0_0_5px_rgba(255,255,255,0.3)]">OK</button></div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. GLOBALS & STATE ---
        const ROUTES_KEY = 'bikeTracker_routes_v1', STATE_KEY = 'bikeTracker_activeRide_v1';
        const themes = [
            { name: 'yellow', vars: { main: '#ffff00', bg: '#eab308', dark: '#ca8a04', dim: '#854d0e', gauge: '#0088ff' } },
            { name: 'white', vars: { main: '#ffffff', bg: '#d4d4d8', dark: '#a1a1aa', dim: '#52525b', gauge: '#ff1493' } },
            { name: 'cyan', vars: { main: '#00ffff', bg: '#06b6d4', dark: '#0891b2', dim: '#164e63', gauge: '#ff1493' } },
            { name: 'green', vars: { main: '#39ff14', bg: '#22c55e', dark: '#16a34a', dim: '#14532d', gauge: '#ff00ff' } },
            { name: 'magenta', vars: { main: '#ff00ff', bg: '#d946ef', dark: '#c026d3', dim: '#701a75', gauge: '#39ff14' } },
            { name: 'orange', vars: { main: '#ffaa00', bg: '#f97316', dark: '#ea580c', dim: '#9a3412', gauge: '#00ffff' } },
            { name: 'pink', vars: { main: '#ff1493', bg: '#ec4899', dark: '#be185d', dim: '#831843', gauge: '#00ffff' } }
        ];

        let activeThemeIndex = 0, currentBrightnessLevel = 0, layoutMode = 0, currentViewIndex = 0, isGridMode = false;
        let map = null, currentRoutePolyline = null, compareRouteGroup = null, currentMarker = null, loadedCompareRoutePoints = null;
        let watchId = null, uiTimer = null, rideSeconds = 0, totalDistanceMiles = 0, lastPosition = null, currentRouteCoords = [];
        let topSpeedMph = 0, topSpeedFlat = 0, topSpeedAscent = 0, topSpeedDescent = 0, longestConsistentSec = 0, longestConsistentDist = 0, longestConsistentSpeed = 0;
        let currentSpeed = 0, stoppedSeconds = 0, currentConsistentSec = 0, currentConsistentDist = 0, consistentSpeedRef = 0, lastGpsTimestamp = 0, consistentStartAlt = 0;
        let splits = [], lastSplitDist = 0, lastSplitTime = 0, totalAscentMeters = 0, totalDescentMeters = 0;
        let p1m = 0, p5m = 0, p20m = 0, calories = 0, longestContPower = 0, currentContPower = 0;
        let maxDist30m = 0, dist30mBuffer = []; 
        let isAutoPaused = false, isAutoPauseEnabled = true, isFirstFix = true;
        let goalType = 'distance', raceGoalValue = 0, currentlyViewingRouteId = null;
        let tireSizeMm = 2136, frontTeeth = 42, rearTeeth = 13, gearRatio = 3.23;
        let voiceEnabled = true, lastAnnouncedMile = 0;
        let prevMaxDist = 0, prevMaxTime = 0, prevMaxSpeed = 0;
        let announcedPRDist = false, announcedPRTime = false, announcedPRSpeed = false;
        let wakeLock = null;
        let isTracking = false;
        
        let powerSum = 0; // Optimized buffer logic
        let powerBuffer = [];
        let globalFTP = 200; 

        // Optimized DOM Cache
        const DOM = {};
        const get = id => document.getElementById(id);
        const click = (id, fn) => { const el = get(id); if (el) el.onclick = fn; };

        function initDOMCache() {
            const ids = [
                'speed', 'speedGauge', 'cadenceVal', 'compassRose', 'liveTimerText', 
                'topSpeed', 'flatTopSpeed', 'avgSpeed', 'statusText', 'statusDot',
                'upcomingHillIndicator', 'upcomingHillText', 'bottomDashboard', 
                'dashboardContainer', 'mainActionBtn', 'liveSummaryBtn', 'saveRouteBtn',
                'alertModal', 'alertText'
            ];
            ids.forEach(id => DOM[id] = get(id));
        }

        function showAlert(msg) {
            if (DOM.alertText) DOM.alertText.innerText = msg;
            if (DOM.alertModal) DOM.alertModal.classList.remove('hidden');
        }

        function decodePoints(ptsData) {
            if (!ptsData) return [];
            if (typeof ptsData === 'string') {
                if (ptsData.includes('|') || (ptsData.includes(',') && !ptsData.includes('['))) {
                    return ptsData.split('|').filter(Boolean).map(s => {
                        const p = s.split(',');
                        return [parseFloat(p[0]), parseFloat(p[1]), parseFloat(p[2]||0), parseFloat(p[3]||0)];
                    });
                }
                try { return JSON.parse(ptsData); } catch(e) { return []; }
            }
            return Array.isArray(ptsData) ? ptsData : [];
        }

        function calculateQuartersFromData(coords, totalDist, totalTime) {
            let q = [];
            if(coords && coords.length > 0 && coords[0].length >= 6) {
                let targets = [totalDist*0.25, totalDist*0.5, totalDist*0.75, totalDist];
                let lastD=0, lastT=0;
                for(let i=0; i<4; i++) {
                    let pt = coords.reduce((prev, curr) => Math.abs((curr[5]||0) - targets[i]) < Math.abs((prev[5]||0) - targets[i]) ? curr : prev);
                    let ptD = i===3 ? totalDist : (pt[5]||0);
                    let ptT = i===3 ? totalTime : (pt[4]||0);
                    let d = ptD - lastD;
                    let t = ptT - lastT;
                    q.push({dist: d, time: t, avg: t>0 ? d/(t/3600) : 0});
                    lastD = ptD; lastT = ptT;
                }
                return q;
            } else {
                let d = totalDist/4, t = totalTime/4;
                let a = t>0 ? d/(t/3600) : 0;
                return [{dist:d,time:t,avg:a},{dist:d,time:t,avg:a},{dist:d,time:t,avg:a},{dist:d,time:t,avg:a}];
            }
        }

        function getTrainingZone(avgSpd, maxAvgSpd) {
            if (!maxAvgSpd || maxAvgSpd <= 0 || avgSpd <= 0) return "";
            let intensity = avgSpd / maxAvgSpd;
            if (intensity < 0.56) return "Zone 1 (Recovery)";
            if (intensity >= 0.56 && intensity <= 0.75) return "Zone 2 (Endurance)";
            if (intensity > 0.75 && intensity <= 0.87) return "Zone 3 (Tempo)";
            if (intensity > 0.87 && intensity <= 0.94) return "Zone 4 (Threshold)";
            if (intensity > 0.94) return "Zone 5 (VO2 Max)";
            return "";
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } 
                catch (err) { console.log('Wake lock failed:', err); }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (isTracking && wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });

        // --- Layout Modes & Views ---
        function cycleTheme() { /* (Remains identical) */ }
        function cycleBrightness() { /* (Remains identical) */ }
        
        function applyLayoutMode() {
            isGridMode = (layoutMode === 2);
            DOM.bottomDashboard.classList.toggle('dash-expanded', layoutMode === 0);
            DOM.bottomDashboard.classList.toggle('dash-full', layoutMode !== 0);
            DOM.dashboardContainer.className = isGridMode ? "grid-mode relative flex-1 max-w-sm mx-auto mb-4 w-full" : "carousel-mode relative flex-1 max-w-sm mx-auto mb-6 w-full shadow-lg";
            showView(currentViewIndex); 
            setTimeout(() => { if(map) map.invalidateSize(); }, 400);
        }

        function toggleDashboardMode() { layoutMode = (layoutMode + 1) % 3; applyLayoutMode(); }

        function showView(index) {
            const viewsIds = ['view-speed', 'view-distance', 'view-compass', 'view-cadence', 'view-map'];
            viewsIds.forEach((id, i) => {
                const el = get(id);
                if (el) {
                    el.classList.toggle('opacity-100', i === index);
                    el.classList.toggle('z-10', i === index);
                    el.classList.toggle('opacity-0', i !== index);
                    el.classList.toggle('z-0', i !== index);
                    el.classList.toggle('pointer-events-none', i !== index);
                }
            });
            document.querySelectorAll('.view-dot').forEach((dot, i) => {
                dot.classList.toggle('bg-neon-main', i === index);
                dot.classList.toggle('shadow-neon-sm', i === index);
                dot.classList.toggle('bg-zinc-800', i !== index);
            });
            if (viewsIds[index] === 'view-map' && !isGridMode) {
                DOM.bottomDashboard.classList.add('bg-transparent', 'border-transparent', 'shadow-none');
                DOM.dashboardContainer.classList.add('map-view-active');
                DOM.bottomDashboard.style.pointerEvents = 'none';
                document.querySelectorAll('#bottomDashboard button').forEach(bt => bt.style.pointerEvents = 'auto');
                DOM.dashboardContainer.style.pointerEvents = 'none';
            } else {
                DOM.bottomDashboard.classList.remove('bg-transparent', 'border-transparent', 'shadow-none');
                DOM.dashboardContainer.classList.remove('map-view-active');
                DOM.bottomDashboard.style.pointerEvents = 'auto';
                DOM.dashboardContainer.style.pointerEvents = 'auto';
            }
        }

        function nextView() { const v = ['view-speed', 'view-distance', 'view-compass', 'view-cadence', 'view-map']; currentViewIndex = (currentViewIndex + 1) % v.length; showView(currentViewIndex); }
        function prevView() { const v = ['view-speed', 'view-distance', 'view-compass', 'view-cadence', 'view-map']; currentViewIndex = (currentViewIndex - 1 + v.length) % v.length; showView(currentViewIndex); }

        function updateMainButtons() {
            const mBtn = DOM.mainActionBtn, sBtn = DOM.liveSummaryBtn, svBtn = DOM.saveRouteBtn;
            if (rideSeconds === 0 && !isTracking) {
                if(mBtn) { mBtn.innerText = "START RIDE"; mBtn.className = "w-full bg-[#2ecc71] text-black font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_15px_rgba(46,204,113,0.4)] border border-[#2ecc71]"; }
                if(sBtn) { sBtn.disabled = false; sBtn.innerText = "TOTALS"; sBtn.className = "w-full bg-black border border-white text-white font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_5px_rgba(255,255,255,0.3)]"; }
                if(svBtn) { svBtn.disabled = true; svBtn.innerText = "STOP / SAVE"; svBtn.className = "w-full bg-[#1a1a1a] text-zinc-600 font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform border border-zinc-800"; }
            } else if (isTracking) {
                if(mBtn) { mBtn.innerText = "PAUSE"; mBtn.className = "w-full bg-[#eab308] text-black font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_15px_rgba(234,179,8,0.4)] border border-[#eab308]"; }
                if(sBtn) { sBtn.disabled = false; sBtn.innerText = "SUMMARY"; sBtn.className = "w-full bg-black border border-white text-white font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_5px_rgba(255,255,255,0.3)]"; }
                if(svBtn) { svBtn.disabled = false; svBtn.innerText = "STOP / SAVE"; svBtn.className = "w-full bg-red-600 text-black font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_15px_rgba(220,38,38,0.4)] border border-red-600"; }
            } else {
                if(mBtn) { mBtn.innerText = "RESUME"; mBtn.className = "w-full bg-[#2ecc71] text-black font-digital text-xl tracking-widest py-3.5 rounded-xl uppercase transition-transform active:scale-95 shadow-[0_0_15px_rgba(46,204,113,0.4)] border border-[#2ecc71]"; }
                if(sBtn) { sBtn.disabled = false; sBtn.innerText = "SUMMARY"; }
                if(svBtn) { svBtn.disabled = false; svBtn.innerText = "STOP / SAVE"; }
            }
        }

        function formatTime(s) { 
            const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = Math.floor(s%60); 
            return h>0 ? `${h}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}` : `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; 
        }

        function calculateDistance(l1, o1, l2, o2) { 
            const R = 3958.8, dLat = (l2-l1)*Math.PI/180, dLon = (o2-o1)*Math.PI/180, a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2; 
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        // --- Core Update Loop ---
        let rawSpdBuffer = [];
        let rawSpdSum = 0;

        function updatePosition(pos) {
            if (pos.coords.accuracy > 150) return; 

            const lat = pos.coords.latitude, lng = pos.coords.longitude, alt = pos.coords.altitude || 0, now = Date.now();
            
            let rawSpd = 0;
            if (pos.coords.speed !== null && pos.coords.speed >= 0) {
                rawSpd = pos.coords.speed * 2.23694;
            } else if (lastPosition && lastGpsTimestamp > 0) {
                let dt = (now - lastGpsTimestamp) / 1000;
                if (dt > 0.5) {
                    let calcDist = calculateDistance(lastPosition.coords.latitude, lastPosition.coords.longitude, lat, lng);
                    rawSpd = calcDist / (dt / 3600);
                }
            }
            if (rawSpd > 150) rawSpd = 0; 
            
            // Optimized Rolling Average Speed
            rawSpdBuffer.push(rawSpd);
            rawSpdSum += rawSpd;
            if (rawSpdBuffer.length > 3) rawSpdSum -= rawSpdBuffer.shift();
            let spd = rawSpdSum / rawSpdBuffer.length;
            if (spd < 0.5) spd = 0;
            
            currentSpeed = spd;
            
            if (DOM.speed) DOM.speed.innerText = Math.round(spd).toString().padStart(2, '0');
            if (DOM.speedGauge) DOM.speedGauge.style.strokeDashoffset = 75 - (75 * Math.min(spd / 50, 1));

            let cadence = (spd > 1.5) ? ((spd * 26822.4) / tireSizeMm) / gearRatio : 0;
            if (DOM.cadence) DOM.cadence.innerText = Math.round(cadence).toString().padStart(2, '0');
            if (pos.coords.heading !== null && DOM.compassRose) DOM.compassRose.style.transform = `rotate(${-pos.coords.heading}deg)`;
            
            if(!currentMarker) currentMarker = L.circleMarker([lat, lng], {radius: 8, fillColor: themes[activeThemeIndex].vars.main, color: '#000', weight: 3, opacity: 1, fillOpacity: 1}).addTo(map);
            else currentMarker.setLatLng([lat, lng]);
            if(isFirstFix) { map.setView([lat, lng], 16); isFirstFix = false; }
            
            if (isTracking && !isAutoPaused) {
                if (lastPosition) {
                    const d = calculateDistance(lastPosition.coords.latitude, lastPosition.coords.longitude, lat, lng);
                    
                    if (d > 0.0005 && d < 0.1) {
                        totalDistanceMiles += d; 
                        updateOdometer(totalDistanceMiles);
                        const da = alt - (lastPosition.coords.altitude || 0);
                        if(da > 0) totalAscentMeters += da; else totalDescentMeters += Math.abs(da);
                        
                        currentRouteCoords.push([lat, lng, alt, spd, rideSeconds, totalDistanceMiles]); 
                        currentRoutePolyline.setLatLngs(currentRouteCoords);

                        dist30mBuffer.push({ t: rideSeconds, d: totalDistanceMiles });
                        while (dist30mBuffer.length > 0 && rideSeconds - dist30mBuffer[0].t > 1800) dist30mBuffer.shift();
                        if (dist30mBuffer.length > 0) {
                            let d30 = totalDistanceMiles - dist30mBuffer[0].d;
                            if (d30 > maxDist30m) maxDist30m = d30;
                        }

                        if (spd > topSpeedMph) topSpeedMph = spd; 
                        
                        if (currentRouteCoords.length >= 10) {
                            // Logic abstracted to reduce inline operations
                            let recentAlts = currentRouteCoords.slice(-5).map(p => p[2] || 0);
                            let avgAlt = recentAlts.reduce((a,b)=>a+b,0) / recentAlts.length;
                            let pastAlts = currentRouteCoords.slice(-10, -5).map(p => p[2] || 0);
                            let pastAvgAlt = pastAlts.reduce((a,b)=>a+b,0) / pastAlts.length;
                            let pastPt = currentRouteCoords[currentRouteCoords.length - 10];
                            let dPast = calculateDistance(pastPt[0], pastPt[1], lat, lng) * 1609.34;
                            
                            if (dPast > 10) {
                                let grade = ((avgAlt - pastAvgAlt) / dPast) * 100;
                                if (grade >= 2.0 && spd > topSpeedAscent) topSpeedAscent = spd;
                                else if (grade <= -2.0 && spd > topSpeedDescent) topSpeedDescent = spd;
                                else if (spd > topSpeedFlat) topSpeedFlat = spd;
                            }
                        } else if (spd > topSpeedFlat) topSpeedFlat = spd; 
                        
                        if(lastGpsTimestamp > 0 && spd >= 4.0 && Math.abs(spd - consistentSpeedRef) <= 1.5) {
                            currentConsistentSec += (now - lastGpsTimestamp) / 1000; currentConsistentDist += d;
                            let elevationDropFt = (consistentStartAlt - alt) * 3.28084;
                            if (elevationDropFt <= 15) {
                                let currentScore = currentConsistentSec * consistentSpeedRef;
                                let longestScore = longestConsistentSec * longestConsistentSpeed;
                                if(currentScore > longestScore) { 
                                    longestConsistentSec = currentConsistentSec; 
                                    longestConsistentDist = currentConsistentDist; 
                                    longestConsistentSpeed = consistentSpeedRef; 
                                }
                            } else {
                                consistentSpeedRef = spd; currentConsistentSec = 0; currentConsistentDist = 0; consistentStartAlt = alt;
                            }
                        } else { consistentSpeedRef = spd; currentConsistentSec = 0; currentConsistentDist = 0; consistentStartAlt = alt; }

                        if(totalDistanceMiles - lastSplitDist >= 0.5) {
                            splits.push({ dist: totalDistanceMiles, time: rideSeconds - lastSplitTime, avg: (totalDistanceMiles - lastSplitDist) / ((rideSeconds - lastSplitTime)/3600) });
                            lastSplitDist = totalDistanceMiles; lastSplitTime = rideSeconds;
                        }
                    }
                } else {
                    consistentStartAlt = alt;
                    currentRouteCoords.push([lat, lng, alt, spd, rideSeconds, totalDistanceMiles]); 
                    currentRoutePolyline.setLatLngs(currentRouteCoords);
                }
            } 
            
            lastPosition = pos;
            lastGpsTimestamp = now;
            
            if (DOM.topSpeed) DOM.topSpeed.innerText = topSpeedMph.toFixed(1);
            if (DOM.flatTopSpeed) DOM.flatTopSpeed.innerText = topSpeedFlat.toFixed(1);
            if (DOM.avgSpeed) DOM.avgSpeed.innerText = rideSeconds > 0 ? (totalDistanceMiles / (rideSeconds / 3600)).toFixed(1) : "0.0";
            
            checkNearbyRoutes(lat, lng);
            updateUpcomingHill(lat, lng);
        }

        function toggleTracking() {
            if (!isTracking) {
                if (!navigator.geolocation) return showAlert("GPS not supported.");
                if (voiceEnabled && 'speechSynthesis' in window) {
                    let unlockMsg = new SpeechSynthesisUtterance('');
                    unlockMsg.volume = 0;
                    window.speechSynthesis.speak(unlockMsg);
                }

                requestWakeLock();
                isAutoPaused = false; stoppedSeconds = 0; isTracking = true;
                lastPosition = null; lastGpsTimestamp = 0;
                rawSpdBuffer = []; rawSpdSum = 0;

                updateMainButtons(); updateStatus("Recording...", "bg-neon-main");
                
                watchId = navigator.geolocation.watchPosition(updatePosition, (err) => console.warn(err), { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 });
                
                if(!uiTimer) {
                    uiTimer = setInterval(() => { 
                        if(isTracking && watchId !== null) { 
                            if (!isAutoPaused && currentSpeed > 0) {
                                let grade = 0;
                                if (currentRouteCoords.length >= 2) {
                                    let p1 = currentRouteCoords[Math.max(0, currentRouteCoords.length-5)]; 
                                    let p2 = currentRouteCoords[currentRouteCoords.length-1];
                                    if(p1 && p2) {
                                        let d = calculateDistance(p1[0], p1[1], p2[0], p2[1]) * 1609.34;
                                        if (d > 5) grade = ((p2[2] || 0) - (p1[2] || 0)) / d;
                                    }
                                }

                                let v = currentSpeed * 0.44704; 
                                let m = 85; 
                                let watts = Math.max(0, ((m * 9.81 * 0.005 * v) + (m * 9.81 * grade * v) + (0.5 * 1.225 * 0.32 * Math.pow(v, 3))) / 0.96);

                                // Optimized Power Buffer (Running Sum logic)
                                powerBuffer.push(watts);
                                powerSum += watts;
                                if (powerBuffer.length > 1200) { powerSum -= powerBuffer.shift(); }

                                const getAvgFast = (len) => {
                                    if (powerBuffer.length < len) return 0;
                                    // Fallback loop if needed, but running sum handles 20m easily
                                    if (len === powerBuffer.length) return powerSum / len;
                                    let sum = 0; for(let i=powerBuffer.length-len; i<powerBuffer.length; i++) sum += powerBuffer[i];
                                    return sum/len;
                                };

                                let cur1m = getAvgFast(60), cur5m = getAvgFast(300), cur20m = getAvgFast(1200);
                                if (cur1m > p1m) p1m = cur1m; if (cur5m > p5m) p5m = cur5m; if (cur20m > p20m) p20m = cur20m;
                                calories += watts / 1000;

                                if (globalFTP > 0 && watts >= globalFTP) {
                                    currentContPower++;
                                    if (currentContPower > longestContPower) longestContPower = currentContPower;
                                } else currentContPower = 0;
                            }
                            
                            // Auto Pause Routine
                            if (isAutoPauseEnabled) {
                                if (currentSpeed < 1.0) {
                                    if (!isAutoPaused) {
                                        stoppedSeconds++;
                                        if (stoppedSeconds >= 30) {
                                            isAutoPaused = true; rideSeconds = Math.max(0, rideSeconds - 30);
                                            updateStatus("Paused", "bg-orange-500");
                                            if (DOM.timer) DOM.timer.innerText = formatTime(rideSeconds);
                                        }
                                    }
                                } else if (currentSpeed > 1.5) {
                                    stoppedSeconds = 0;
                                    if (isAutoPaused) { isAutoPaused = false; updateStatus("Recording...", "bg-neon-main"); }
                                }
                            }

                            if (!isAutoPaused) {
                                rideSeconds++; 
                                if (DOM.timer) DOM.timer.innerText = formatTime(rideSeconds); 
                            }
                            
                            // Throttled storage save
                            if (rideSeconds % 5 === 0) saveRideState(true); 
                        }
                    }, 1000);
                }
            } else {
                if(watchId !== null) navigator.geolocation.clearWatch(watchId); 
                watchId = null; isTracking = false;
                updateMainButtons(); saveRideState(false); updateStatus("Paused", "bg-orange-500");
            }
        }

        function saveRideState(active) {
            try { 
                let compressedCoords = currentRouteCoords;
                if (compressedCoords.length > 1000) {
                    const step = Math.ceil(compressedCoords.length / 1000);
                    compressedCoords = compressedCoords.filter((_, idx) => idx % step === 0);
                }
                compressedCoords = compressedCoords.map(p => [Number(p[0]).toFixed(5), Number(p[1]).toFixed(5), Number((p[2]||0).toFixed(1)), Number((p[3]||0).toFixed(1)), p[4], p[5]]);
                
                localStorage.setItem(STATE_KEY, JSON.stringify({ 
                    rideSeconds, totalDistanceMiles, topSpeedMph, topSpeedFlat, topSpeedAscent, topSpeedDescent, longestConsistentSec, longestConsistentDist, longestConsistentSpeed, splits, lastSplitDist, lastSplitTime, ascent: totalAscentMeters, descent: totalDescentMeters, coords: compressedCoords,
                    p1m, p5m, p20m, calories, longestContPower, maxDist30m
                })); 
            } catch(e) {}
        }

        // Rest of the application (Render graphs, Show Totals/Summaries) remains identical.
        // Ensure to call initDOMCache() within window.onload
        
        window.onload = () => {
            initDOMCache();
            // ... (rest of standard bindings & init methods)
        };
    </script>
</body>
